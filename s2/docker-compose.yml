version: '3.8'
services:
  db_master:
    image: postgres:15
    container_name: postgres_master
    restart: always
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: dbtest
    ports:
      - "5432:5432"
    command: |
      postgres 
      -c wal_level=logical 
      -c max_wal_senders=10 
      -c max_replication_slots=10 
      -c listen_addresses='*'
    volumes:
      - ./init-master.sh:/docker-entrypoint-initdb.d/init-master.sh
  
  db_replica_1:
    image: postgres:15
    container_name: postgres_replica_1
    depends_on:
      - db_master
    ports:
      - "5433:5432"
    environment:
      PGPASSWORD: pass
    entrypoint: [ "/bin/bash", "-c", "sleep 10 && rm -rf /var/lib/postgresql/data/* && pg_basebackup -h db_master -D /var/lib/postgresql/data -U replicator -P -R && docker-entrypoint.sh postgres" ]

  db_replica_2:
    image: postgres:15
    container_name: postgres_replica_2
    depends_on:
      - db_master
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=dbtest
  
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mail.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "8080:80"

  flyway:
    image: flyway/flyway:9
    command: -url=jdbc:postgresql://db_master:5432/dbtest -user=postgres -password=1234 -connectRetries=60 migrate
    volumes:
      - ./Migrations:/flyway/sql
    depends_on:
      - db_master

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    environment:
      # Теперь тянет данные с мастера
      DATA_SOURCE_NAME: "postgresql://postgres:1234@db_master:5432/dbtest?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - db_master

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
